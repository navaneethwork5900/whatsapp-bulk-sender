<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        Susheel Travels
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

    <!-- HERO -->

    <section class="hero">

        <div class="overlay"></div>

        <header>

            <img
                src="./assets/logo.png"
                class="logo"
                alt="Susheel Travels"
            >

        </header>

        <div class="hero-content">

            <div class="glass-card">

                <h1>
                    Susheel Travels
                </h1>

                <p class="tagline">
                    Passenger Feedback & Loyalty System
                </p>

                <p class="description">
                    Upload passenger journey data and
                    automatically send feedback requests
                    and loyalty rewards through WhatsApp.
                </p>

                <input
                    type="file"
                    id="excelFile"
                    accept=".xlsx,.xls"
                >

                <button onclick="processExcel()">
                    Send WhatsApp Messages
                </button>

                <div id="status"></div>

            </div>

        </div>

    </section>

    <!-- GALLERY -->

    <section class="gallery-section">

        <h2>
            Experience Luxury Travel
        </h2>

        <div class="gallery-grid">

            <img
                src="./assets/gallery-1.png"
                alt="Gallery 1"
            >

            <img
                src="./assets/gallery-2.png"
                alt="Gallery 2"
            >

            <img
                src="./assets/gallery-3.png"
                alt="Gallery 3"
            >

            <img
                src="./assets/gallery-4.png"
                alt="Gallery 4"
            >

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
