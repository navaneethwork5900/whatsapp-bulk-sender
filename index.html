<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Susheel Travels | WhatsApp Bulk Sender</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <div class="logo-area">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg" alt="Susheel Travels Logo">
    <div>
      <h2>Susheel Travels</h2>
      <p>Smart Travel Communication System</p>
    </div>
  </div>
</header>

<section class="hero">
  <div class="overlay"></div>

  <div class="content">

    <div class="card">

      <h1>WhatsApp Passenger Notification System</h1>

      <p class="subtitle">
        Upload Excel contacts and instantly send travel updates, booking confirmations, pickup alerts, and journey notifications.
      </p>

      <input type="file" id="excelFile" accept=".xlsx,.xls">

      <button onclick="processExcel()">
        Send WhatsApp Messages
      </button>

      <div id="status"></div>

    </div>

  </div>
</section>

<script src="script.js"></script>

</body>
</html>
