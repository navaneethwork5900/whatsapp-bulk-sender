<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        Susheel Travels
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

    <!-- HERO -->

    <section class="hero">

        <div class="overlay"></div>

        <header>

            <img
                src="./assets/logo.png"
                class="logo"
                alt="Susheel Travels"
            >

        </header>

        <div class="hero-content">

            <div class="glass-card">

                <h1>
                    Susheel Travels
                </h1>

                <p class="tagline">
                    Passenger Feedback & Loyalty System
                </p>

                <p class="description">
                    Upload completed passenger journey data
                    and automatically send WhatsApp feedback
                    requests and loyalty rewards.
                </p>

                <input
                    type="file"
                    id="excelFile"
                    accept=".xlsx,.xls"
                >

                <button onclick="processExcel()">
                    Send WhatsApp Messages
                </button>

                <div id="status"></div>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
